stade:
  - build
  - test
  - deploy
variable:
  IMAGE_NAME: "registry.gitlab.com/msogoba-web/mini-devops"

build:
  stage: build
  script:
    - docker build -t $IMAGE_NAME:$CI_COMMIT_SHORT_SHA .
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $IMAGE_NAME:$CI_COMMIT_SHORT_SHA

test:
  stage: test
  script:
    - echo "Running tests..."
    - python -m py_compile app.py

deploy:
  stage: deploy
  script:
    - docker pull $IMAGE_NAME:$CI_COMMIT_SHORT_SHA
    - docker stop mini-devops || true
    - docker rm mini-devops || true
    - docker run -d -p 5000:5000 --name mini-devops $IMAGE_NAME:$CI_COMMIT_SHORT_SHA
  when: manual

